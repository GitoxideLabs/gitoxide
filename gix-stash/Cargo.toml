lints.workspace = true

[package]
name = "gix-stash"
version = "0.0.0"
repository = "https://github.com/GitoxideLabs/gitoxide"
license = "MIT OR Apache-2.0"
description = "A crate of the gitoxide project providing `git stash` plumbing (push + pop)"
authors = ["Sebastian Thiel <sebastian.thiel@icloud.com>"]
edition = "2024"
rust-version = "1.85"
include = ["/src/**/*", "/LICENSE-*"]

[lib]
doctest = false

[features]
## Enable support for the SHA-1 hash by forwarding the feature to dependencies.
sha1 = ["gix-hash/sha1", "gix-index/sha1", "gix-object/sha1"]

[dependencies]
gix-hash         = { version = "^0.25.0", path = "../gix-hash" }
gix-object       = { version = "^0.60.0", path = "../gix-object" }
gix-index        = { version = "^0.51.0", path = "../gix-index" }
gix-ref          = { version = "^0.63.0", path = "../gix-ref" }
gix-actor        = { version = "^0.41.0", path = "../gix-actor" }
gix-date         = { version = "^0.15.3", path = "../gix-date" }
gix-trace        = { version = "^0.1.19", path = "../gix-trace" }
gix-features     = { version = "^0.48.0", path = "../gix-features", features = ["progress"] }
gix-dir          = { version = "^0.25.0", path = "../gix-dir" }
gix-diff         = { version = "^0.63.0", path = "../gix-diff", default-features = false, features = ["blob"] }
gix-merge        = { version = "^0.16.0", path = "../gix-merge" }
gix-worktree-state = { version = "^0.30.0", path = "../gix-worktree-state" }

bstr      = { version = "1.12.0", default-features = false, features = ["std"] }
smallvec  = "1.15.1"
thiserror = "2.0.18"

[dev-dependencies]
gix-testtools = { path = "../tests/tools" }
gix-hash      = { path = "../gix-hash", features = ["sha1"] }
gix-odb       = { path = "../gix-odb", features = ["sha1"] }

[package.metadata.docs.rs]
features = ["sha1"]
